<html>
    <head>
        <meta charset="utf-8">

        <title>Joel's Medical Form</title>

        <!-- Load external CSS styles -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="header"> 
            <table width="100%">
                <tr>
                    <td>
                        <img 
                            id="logo" 
                            src="lcrvlogo.png" 
                            alt="Shasta Medical Form"
                            width="60"
                            height="60"
                        >
                    </td>
                    <td valign="top">CadMD Medical Form</td>
                    <td valign="bottom" align="right">Today's date: <span id="today">Date goes here </span></td>
                </tr>
            </table>
        </div>
        <hr>
        <div id="body">
<form action="HW2thanks.html">
   <table class="form" style="margin-left:0;">
    <tr class="form">
        <th class="form" colspan="2">Fill out the following information</th>
    </tr>
    <tr class="form">
        <td align="right">
    <label for="firstname">First Name</label>
        </td>
        <td>
             <input type="text"
                    size="25"
                    maxlength="30" 
                    id="firstname" 
                    name="firstname" 
                    required
                    oninvalid="this.setCustomValidity('First Name is Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="(req'd)"
            >       
    <label for="middleinit">MI</label>
            <input type="text" 
                    size="1"
                    maxlength="1" 
                    id="middleinit" 
                    name="middleinit" 
                    placeholder="Q"
            >
    <label for="lastname">Last Name</label>
            <input type="text"
                    size="20"
                    maxlength="30" 
                    id="lastname" 
                    name="lastname" 
                    required
                    oninvalid="this.setCustomValidity('Last Name is Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="Public (req'd)"
            >
        <span id="name_text"></span></td>            
  </tr>
            
  <tr  class="form">
        <td align="right">     
            <label for="DOB" >Date of Birth</label>
        </td>
        <td>
            <input type="date" 
                    size="20" 
                    minlength="4"
                    maxlength="10" 
                    id="DOB" 
                    name="DOB" 
                    required
                    oninvalid="this.setCustomValidity('Date of Birth Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="mm/dd/yy"
            >
        </td>
  </tr>
<tr  class="form">         
    <td align="right">
      <label for="SSN">Social Security</label>
        </td>
            <td>
            <input type="text" 
                    size="20" 
                    minlength="9"
                    maxlength="11" 
                    id="SSN" 
                    name="SSN" 
                    required
                    oninvalid="this.setCustomValidity('Social Security Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="***-**-****">

                </td>   
  </tr>         
    <tr  class="form">        
        <td align="right">
            <label for="addr1" >Address Line 1</label>
        </td>
        <td>
            <input type="text" 
                    size="20" 
                    minlength="4"
                    maxlength="30" 
                    id="addr1" 
                    name="addr1" 
                    required
                    oninvalid="this.setCustomValidity('At least 1 address line Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="1234 Main St (req'd)"
            >
        <span id="addr1_text">
        </td>
    </tr>
    <tr  class="form">
        <td align="right">
            <label for="addr2">Address Line 2</label>
        </td>
        <td>
            <input type="text" 
                    size="20" 
                    maxlength="30" 
                    id="addr1" 
                    name="addr1" 
                    placeholder="Apt #, etc..."
            >
            <span id="addr2_text">
        </td>
    </tr>
        
    <tr class="form">
        <td align="right">
            <label for="city">City,</label>
            <label for="state">ST</label>
            <label for="zip">Zip</label>
        </td>
        <td>
            <input type="text" 
                    size="10" 
                    maxlength="25" 
                    id="city" 
                    name="city" 
                    required
                    oninvalid="this.setCustomValidity('You forgot City')"
                    oninput="this.setCustomValidity('')"
                    placeholder="Anytown (req'd)"
            >
            <select required>
                <option value=""></option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District Of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
            </select>
            <input type="text" 
                    pattern="[0-9]{5}"
                    size="5"
                    maxlength="5" 
                    id="zip" 
                    name="zip" 
                    required
                    oninvalid="this.setCustomValidity('5 Digit Zip/Postal Code required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="00000"
            >
            <span id="City_text"><span id="State_text"> </span>
            </td>    
    </tr>
       
    <tr class="form">
        <td align="right">
            <label for="phone">Phone #</label>
        </td>
        <td>
            <input type="text" 
                    size="13" 
                    maxlength="13" 
                    id="phone" 
                    name="phone" 
                    placeholder="(713)555-1212"
            >
            <span id="phone_text"></span>  
        </td>
    </tr>
 <tr class="form">
     <td align="right">
            <label for="Email">Email Address</label>
    </td>
     <td>
            <input type="text" 
                    size="30" 
                    maxlength="30" 
                    id="Email" 
                    name="Email" 
                    placeholder="name@domain.com"
            >   
     </td>
 </tr>
     
 <tr class="form"> 
     <td align="right" valign="top"><label for="vaclist"> Check which Vaccines you have which are up-to-date?</label></td> 
  <td>   
 <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
 <label for="vehicle1">Measles</label><br>
 <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">     
 <label for="vehicle2">Pneumococcal</label><br>
 <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
 <label for="vehicle3">Meningococcal</label><br>
 <input type="checkbox" id="shingles" name="shingles" value="shingles">
 <label for="shingles">Shingles</label><br>
 <input type="checkbox" id="malaria" name="malari" value="malaria">
 <label for="malaria">Malaria</label><br>
  </td>  
 </tr>

<td align="right" valign="top">
        <label for="symptoms">Describe your current symptoms:</label>
    </td>
    <td>
        <textarea id="symptoms" 
                  name="symptoms" 
                  rows="3" 
                  cols="50" 
                  placeholder="Please enter details here..."></textarea>
    </td>
</tr>
    
<tr>        
        <td colspan="2">
            <center>
            <input type="submit">
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="reset">
            </center>
        </td>
    <tr>
    </tr>

 </table>
</form> 
        </div>
        <div id="footer">
            <hr>
            Thanks for your cooperation!
        </div>
        <!-- Load external JavaScript -->
        <script src="homework1.js"></script>
        
 <script>
    document.getElementById("today").innerHTML = new Date().toLocaleDateString();
</script>
</body>
<!-- End of file: homework1.html -->
</html>
